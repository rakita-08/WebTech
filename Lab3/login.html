<!DOCTYPE html>
<html>

  <style>
    body { font-family: Arial, sans-serif; margin: 60px; }

  <h2>User Login</h2>

  <form action="login.php" method="post">
    <table>
      <tr>
        <td>Username:</td>

      </tr>
      <tr>
        <td>Password:</td>
        <td><input type="password" name="password" placeholder="Enter password"></td>
      </tr>
      <tr>
        <td></td>

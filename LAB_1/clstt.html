<!DOCTYPE html>
<html>
<head>
  <title>Class Timetable</title>
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f2f5;
      padding-top: 50px
    }
    h1 {
      text-align: center;
      font-size: 50px;
      color: #1e2a3a;
      margin-bottom: 0.1px;
    }
    .subtitle {
      text-align: center;
      color: #6b7a90;
      font-size: 0.9rem; 
    }
     table {

      background: #fff;
      font-size: 15px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
      text-align: center;
      margin: 2px auto;
      border-collapse: collapse;
    }
    th, td{
        border: 1px solid ;
    }
    th{
        background-color: rgb(201, 195, 195);
    }
  </style>
</head>
<body>

     <tr>

  </table>

</body>
</html>

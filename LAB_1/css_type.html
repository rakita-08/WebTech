<!DOCTYPE html>
<html>
<head>
  <title>CSS type</title>
  <!--Internal CSS-->
  <style>
    body {
      background-color: lightgray;
    }
    #int_css{
      color: darkgreen;
      font-size: 30px;
      text-align: right;
    }
  </style>
  <!--External CSS link-->
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 style="color: purple;">This text is using Inline CSS</h1>
    <p id="int_css">This is for Internal CSS</p>
    <p id="ext_css">And now this is via External CSS</p>

</body>
</html>

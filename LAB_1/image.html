<!DOCTYPE html>
<html>
<head>
  <title>Display Image</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 40px;
      background-color: #b4acd2;
    }
    h2 {
      color: darkblue;
    }
    img {
      border: 4px solid rgb(100, 100, 111);
      margin: 10px;
    }
  </style>
</head>
<body>

  <h2>Displaying Images in HTML</h2>
        <!-- Basic image -->
        <h3>1. Basic Image</h3>
        <img src="me.jpg" alt="My Photo" width="200" height="200">My Photo

        <!-- Image with border and size -->
        <h3>2. Image with Different Size</h3>
        <img src="me.jpg" alt="My Photo" width="250" height="150">Stretched Image (250 x 150)
        <!-- Image as a hyperlink -->
        <h3>3. Image as a Hyperlink</h3>
        <a href="https://www.google.com" target="_blank">
            <img src="me.jpg" alt="Click Me" width="150" height="150">
        </a>Click on the image to open Google

        <!-- Image with tooltip -->
        <h3>4. Image with Tooltip</h3>
        <img src="me.jpg" alt="Hover Me" title="This is a tooltip!" width="150" height="150">Hover over the image to see tooltip
</body>
</html>
